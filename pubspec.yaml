name: canadafuel
description: "A new Flutter application to track gas prices in Canada."
publish_to: 'none'
version: 1.3.0+3

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.2.0
  shared_preferences: ^2.2.2
  geolocator: ^11.0.1
  flutter_local_notifications: ^17.1.0
  workmanager: ^0.6.0
  permission_handler: ^12.0.1
  google_mobile_ads: ^5.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "icon.png"
  adaptive_icon_background: "#009688"
  adaptive_icon_foreground: "icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
